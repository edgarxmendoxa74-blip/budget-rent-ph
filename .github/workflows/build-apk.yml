# Fixed Capacitor Android Dependency
name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Web Assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://utdarqyhkiexotouqjkz.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_e9GTC0ectIpgy1kBi_dCew_EphQdDVT' }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor Core & Android
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Android App
        run: |
          if [ -d "android" ]; then rm -rf android; fi
          npx cap add android
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: budget-rent-ph-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
